version: "3.9"

services:
  rating-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: rating-service
    ports:
      - "8088:8088"
    environment:
      MONGO_URI: mongodb://mongo:27017/rating_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      EUREKA_SERVER_URL: http://host.docker.internal:8761/eureka
      EUREKA_ENABLED: "true"
      SERVER_PORT: 8088
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - rating-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  mongo:
    image: mongo:7.0
    container_name: rating-mongo
    ports:
      - "27025:27017"
    volumes:
      - rating-mongo-data:/data/db
    networks:
      - rating-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rating-rabbitmq
    ports:
      - "5677:5672"
      - "15677:15672"
    networks:
      - rating-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  rating-mongo-data:

networks:
  rating-net:
    driver: bridge
